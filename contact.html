<main>

<section class="card">

    <h2>Contact Form</h2>

    <p>This page includes form elements and interactive design.</p>

    <img src="contact-flowers.jpg" alt="Pink Flower Garden" class="page-image">

    <form>

        <label>Name</label>
        <input type="text" placeholder="Your name">

        <label>Email</label>
        <input type="email" placeholder="Your email">

        <label>Topic</label>

        <select>
            <option>Flower Question</option>
            <option>Website Feedback</option>
            <option>Project Question</option>
        </select>

        <label>Message</label>

        <textarea rows="6" placeholder="Write your message here"></textarea>

        <button class="button" type="submit">Send</button>

    </form>

</section>

</main>

<footer>
    <p>SF Flowers Final Website | Contact Page</p>
</footer>

</body>
